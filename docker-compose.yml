version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: factchecker_backend
    ports:
      - "8000:8000"
    volumes:
      - ./similarity/checkpoints:/app/similarity/checkpoints
      - ./.env:/app/.env
      - ./report:/app/report
      - ./feedback:/app/feedback
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: factchecker_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
